<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root {
            --bg: #ffffff;
            --text: #222222;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }

        body.dark-theme {
            --bg: #121212;
            --text: #ffffff;
        }





        .premium-cta {
            position: relative;
            overflow: hidden;

            padding: 70px;

            border-radius: 32px;

            background:
                linear-gradient(135deg,
                    #0f172a 0%,
                    #12344d 50%,
                    #1790A8 100%);

            color: #fff;

            box-shadow:
                0 25px 60px rgba(0, 0, 0, .15);
        }

        /* Floating Shapes */
        .cta-shape {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .shape-1 {
            width: 300px;
            height: 300px;

            top: -120px;
            right: -100px;

            background:
                rgba(139, 255, 255, .08);
        }

        .shape-2 {
            width: 220px;
            height: 220px;

            bottom: -80px;
            left: -80px;

            background:
                rgba(255, 255, 255, .05);
        }

        .cta-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;

            padding: 10px 18px;

            border-radius: 50px;

            background:
                rgba(255, 255, 255, .12);

            backdrop-filter: blur(10px);

            font-weight: 600;

            color: #8bffff;
        }

        .premium-cta h2 {
            margin-top: 20px;

            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.15;
        }

        .premium-cta h2 span {
            display: block;
            color: #8bffff;
        }

        .premium-cta p {
            max-width: 650px;
            margin-top: 20px;

            font-size: 1.1rem;
            line-height: 1.8;

            color: rgba(255, 255, 255, .85);
        }

        .cta-benefits {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;

            margin: 30px 0;
        }

        .benefit {
            padding: 12px 18px;

            border-radius: 50px;

            background:
                rgba(255, 255, 255, .10);

            backdrop-filter: blur(10px);
        }

        .benefit i {
            color: #8bffff;
            margin-right: 8px;
        }

        .cta-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-primary-cta,
        .btn-secondary-cta {
            text-decoration: none;

            padding: 15px 28px;

            border-radius: 14px;

            font-weight: 700;

            transition: .3s;
        }

        .btn-primary-cta {
            background: var(--gradient-main);
            color: #fff;
        }

        .btn-secondary-cta {
            border: 1px solid rgba(255, 255, 255, .25);
            color: #fff;
            background: rgba(255, 255, 255, .08);
        }

        .btn-primary-cta:hover,
        .btn-secondary-cta:hover {
            transform: translateY(-4px);
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .stat-card {
            padding: 30px 20px;

            text-align: center;

            border-radius: 24px;

            background:
                rgba(255, 255, 255, .10);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, .12);
        }

        .stat-card i {
            font-size: 28px;
            color: #8bffff;
            margin-bottom: 15px;
        }

        .stat-card h3 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .stat-card span {
            color: rgba(255, 255, 255, .8);
        }

        @media(max-width:991px) {

            .premium-cta {
                padding: 40px 25px;
            }

            .premium-cta h2 {
                font-size: 2.2rem;
            }

            .stats-grid {
                margin-top: 40px;
            }
        }

        @media(max-width:576px) {

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .cta-buttons a {
                width: 100%;
                text-align: center;
            }

            .premium-cta h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div>

        <button id="themeToggle" class="btn btn-primary">
            Auto Theme
        </button>

        <button id="resetTheme" class="btn btn-secondary">
            Reset Auto Mode
        </button>

        <div class="container my-5">
            <h1>Title content area</h1>

            <p>
                lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate. Doloribus, quisquam. Dolor
            </p>


        </div>
    </div>
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>


        document.addEventListener('DOMContentLoaded', () => {


            const themeButton = document.getElementById('themeToggle');

            function isNightTime() {
                const hour = new Date().getHours();
                return hour >= 19 || hour < 6;
            } function applyAutoTheme() {
                const darkMode = isNightTime();
                document.body.classList.toggle('dark-theme', darkMode); themeButton.textContent = darkMode ? '🌙 Dark Mode (Auto)'
                    : '☀️ Light Mode (Auto)';
            } function applySavedTheme() {
                const savedTheme = localStorage.getItem('theme'); if
                    (savedTheme === 'dark') { document.body.classList.add('dark-theme'); themeButton.textContent = '🌙 Dark Mode'; }
                else if (savedTheme === 'light') {
                    document.body.classList.remove('dark-theme');
                    themeButton.textContent = '☀️ Light Mode';
                } else { applyAutoTheme(); }
            } applySavedTheme();
            themeButton.addEventListener('click', () => {

                const isDark =
                    document.body.classList.toggle('dark-theme');

                localStorage.setItem(
                    'theme',
                    isDark ? 'dark' : 'light'
                );

                themeButton.textContent = isDark
                    ? '🌙 Dark Mode'
                    : '☀️ Light Mode';
            });

            setInterval(() => {

                const savedTheme = localStorage.getItem('theme');

                if (!savedTheme) {
                    applyAutoTheme();
                }

            }, 60000);


            const resetButton = document.getElementById('resetTheme');

            resetButton.addEventListener('click', () => {
                localStorage.removeItem('theme');
                applyAutoTheme();
            });

        });
    </script>



</body>

</html>
