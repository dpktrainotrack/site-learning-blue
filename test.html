<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #222222;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }

        body.dark-theme {
            --bg: #121212;
            --text: #ffffff;
        }
    </style>
</head>

<body>
    <div>

        <button id="themeToggle" class="btn btn-primary">
            Auto Theme
        </button>

        <button id="resetTheme" class="btn btn-secondary">
            Reset Auto Mode
        </button>

        <div class="container my-5">
            <h1>Title content area</h1>

            <p>
                lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate. Doloribus, quisquam. Dolor
            </p>
        </div>
    </div>
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const themeButton = document.getElementById('themeToggle');

            function isNightTime() {
                const hour = new Date().getHours();
                return hour >= 19 || hour < 6;
            } function applyAutoTheme() {
                const darkMode = isNightTime();
                document.body.classList.toggle('dark-theme', darkMode); themeButton.textContent = darkMode ? '🌙 Dark Mode (Auto)'
                    : '☀️ Light Mode (Auto)';
            } function applySavedTheme() {
                const savedTheme = localStorage.getItem('theme'); if
                    (savedTheme === 'dark') { document.body.classList.add('dark-theme'); themeButton.textContent = '🌙 Dark Mode'; }
                else if (savedTheme === 'light') {
                    document.body.classList.remove('dark-theme');
                    themeButton.textContent = '☀️ Light Mode';
                } else { applyAutoTheme(); }
            } applySavedTheme();
            themeButton.addEventListener('click', () => {

                const isDark =
                    document.body.classList.toggle('dark-theme');

                localStorage.setItem(
                    'theme',
                    isDark ? 'dark' : 'light'
                );

                themeButton.textContent = isDark
                    ? '🌙 Dark Mode'
                    : '☀️ Light Mode';
            });

            setInterval(() => {

                const savedTheme = localStorage.getItem('theme');

                if (!savedTheme) {
                    applyAutoTheme();
                }

            }, 60000);


            const resetButton = document.getElementById('resetTheme');

            resetButton.addEventListener('click', () => {
                localStorage.removeItem('theme');
                applyAutoTheme();
            });

        });
    </script>



</body>

</html>
